<!DOCTYPE html>
<html>
<head>
    <title>香氛諮詢 1</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='quiz1.css') }}">
</head>

<body>

<div id="fadeScreen"></div>

<div class="quiz-page">

    <div class="logo">SCENT MEET</div>

    <div class="step">1 / 4</div>

    <div class="question">您想為誰尋找香水呢？</div>

    <form id="quizForm" action="/quiz/2" method="post">

        <input type="hidden" id="purposeInput" name="purpose">

        <div class="choices">
            <button
                class="choice-btn"
                type="button"
                onclick="chooseOption('self.jpg', this, '自用')">
                自用
            </button>

            <button
                class="choice-btn"
                type="button"
                onclick="chooseOption('gift.jpg', this, '送禮')">
                送禮
            </button>
        </div>

    </form>

    <button
        class="back-btn"
        type="button"
        onclick="history.back()">
        上一步
    </button>

    <button
        class="next-btn"
        type="button"
        onclick="goNext()">
        確認
    </button>

</div>

<script>
function chooseOption(imageName, button, purpose){

    document.getElementById("purposeInput").value = purpose;

    document.querySelectorAll(".choice-btn").forEach(btn=>{
        btn.classList.remove("active");
    });

    button.classList.add("active");

    const fade = document.getElementById("fadeScreen");
    const page = document.querySelector(".quiz-page");

    fade.classList.add("show");

    setTimeout(()=>{

        page.style.backgroundImage =
        "linear-gradient(rgba(0,0,0,.4), rgba(0,0,0,.4)), url('/static/images/" + imageName + "')";

        fade.classList.remove("show");

    },180);
}

function goNext(){

    const purpose = document.getElementById("purposeInput").value;

    if(purpose === ""){
        alert("請先選擇一個選項");
        return;
    }

    document.getElementById("quizForm").submit();
}
</script>

</body>
</html>
